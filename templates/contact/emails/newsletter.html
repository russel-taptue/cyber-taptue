{% load i18n %}{% autoescape off %}
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background-color:#f1f5f9;font-family:Inter,system-ui,-apple-system,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f1f5f9;padding:40px 20px;">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

<!-- Header -->
<tr><td style="background:linear-gradient(135deg,#1e1b4b,#312e81);padding:32px 30px;text-align:center;">
<h1 style="color:#ffffff;font-size:20px;font-weight:700;margin:0;">{{ subject }}</h1>
</td></tr>

<!-- Body -->
<tr><td style="padding:30px;">
<p style="color:#334155;font-size:16px;line-height:1.6;margin:0 0 20px 0;">{% trans "Hi there," %}</p>
<div style="color:#334155;font-size:15px;line-height:1.8;">
{{ body|linebreaks }}
</div>
</td></tr>

<!-- Footer -->
<tr><td style="background-color:#f8fafc;padding:24px 30px;text-align:center;border-top:1px solid #e2e8f0;">
<p style="color:#94a3b8;font-size:12px;margin:0 0 8px 0;">
{% trans "To unsubscribe from these emails, click here:" %}
</p>
<a href="{{ unsubscribe_url }}" style="color:#6366f1;font-size:12px;text-decoration:underline;">{% trans "Unsubscribe" %}</a>
<p style="color:#94a3b8;font-size:11px;margin:12px 0 0 0;">© Cyber With Taptue, {{ year }}</p>
</td></tr>

</table>
</td></tr>
</table>
</body>
</html>
{% endautoescape %}
