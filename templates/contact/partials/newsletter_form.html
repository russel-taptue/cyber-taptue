{% load i18n %}
<div id="newsletter-form-container">
    <form hx-post="{% url 'contact:contact' %}" hx-target="#newsletter-form-container" hx-swap="outerHTML" class="space-y-4">
        {% csrf_token %}
        <div>
            <label for="{{ newsletter_form.email.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1.5">
                {% trans "Email Address" %}
            </label>
            {{ newsletter_form.email }}
            {% if newsletter_form.email.errors %}
            <div class="mt-1.5 text-sm text-red-600">
                {% for error in newsletter_form.email.errors %}
                <p>{{ error }}</p>
                {% endfor %}
            </div>
            {% endif %}
        </div>
        <button type="submit" class="w-full px-6 py-3 rounded-xl bg-cyber-500 text-white font-semibold text-sm hover:bg-cyber-400 transition-colors shadow-lg shadow-cyber-500/20">
            {% trans "Subscribe" %}
        </button>
    </form>
</div>
