{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}
{% get_available_languages as LANGUAGES %}
{% get_language_info_list for LANGUAGES as languages %}
<form action="{% url 'set_language' %}" method="post" class="inline-flex">
    {% csrf_token %}
    <input name="next" type="hidden" value="{{ request.path }}">
    <select name="language" onchange="this.form.submit()" class="appearance-none bg-slate-800 text-sm text-slate-200 rounded-lg px-3 py-1.5 border border-slate-700 cursor-pointer hover:border-cyber-500/50 focus:outline-none focus:ring-2 focus:ring-cyber-500/30 focus:border-cyber-500 transition-colors">
        {% for language in languages %}
        <option value="{{ language.code }}" {% if language.code == LANGUAGE_CODE %}selected{% endif %}>
            {{ language.name_local|title }}
        </option>
        {% endfor %}
    </select>
</form>
