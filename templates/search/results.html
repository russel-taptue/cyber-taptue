{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Search" %} — Cyber With Taptue{% endblock title %}

{% block content %}
<section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 lg:py-16">
    <div class="mb-10">
        <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-900">
            {% trans "Search" %}
        </h1>
        <p class="mt-2 text-lg text-slate-600">
            {% trans "Find articles, tutorials, and projects." %}
        </p>
    </div>

    <form method="get" action="{% url 'search:search' %}" class="mb-10">
        <div class="flex gap-3 max-w-2xl">
            <input
                type="text"
                name="q"
                value="{{ query }}"
                placeholder="{% trans 'Search the platform...' %}"
                hx-get="{% url 'search:search' %}"
                hx-trigger="keyup changed delay:300ms"
                hx-target="#search-results"
                hx-select="#search-results"
                hx-swap="outerHTML"
                hx-indicator="#search-indicator"
                class="flex-1 rounded-xl border border-slate-300 px-4 py-3 text-sm focus:ring-2 focus:ring-cyber-500/30 focus:border-cyber-500 outline-none transition-colors"
            />
            <button type="submit" class="px-6 py-3 rounded-xl bg-cyber-500 text-white font-semibold hover:bg-cyber-400 transition-colors shadow-lg shadow-cyber-500/20">
                {% trans "Search" %}
            </button>
        </div>
        <div id="search-indicator" class="htmx-indicator mt-2">
            <div class="inline-block w-5 h-5 border-2 border-cyber-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
    </form>

    <div id="search-results">
        {% include "search/includes/results_partial.html" %}
    </div>
</section>
{% endblock content %}
